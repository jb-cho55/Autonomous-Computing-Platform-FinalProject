<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#546e7a"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="920" height="470" fill="#fbfbfc"/>

  <text x="460" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#263238">보안 CAN 차량 네트워크 아키텍처</text>
  <text x="460" y="68" text-anchor="middle" font-size="13" fill="#78909c">센서 데이터를 암호화·서명하여 3-노드로 전달하고 엔진 RPM을 제어</text>

  <!-- Node1 -->
  <rect x="40" y="105" width="240" height="215" rx="14" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#sh)"/>
  <text x="160" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#0d47a1">① Node1 · 센서 ECU</text>
  <text x="160" y="162" text-anchor="middle" font-size="11.5" fill="#1565c0">Arduino UNO + ERIKA RTOS</text>
  <line x1="64" y1="176" x2="256" y2="176" stroke="#90caf9"/>
  <text x="160" y="200" text-anchor="middle" font-size="12.5" fill="#37474f">throttle · lidar · camera 수집</text>
  <text x="160" y="226" text-anchor="middle" font-size="12.5" fill="#37474f">DES 암호화 (key 0x1234)</text>
  <text x="160" y="252" text-anchor="middle" font-size="12.5" fill="#37474f">서명자리 [5:7] = 0</text>
  <text x="160" y="298" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0d47a1">암호문 5B 송신</text>

  <!-- Orin -->
  <rect x="340" y="105" width="240" height="215" rx="14" fill="#fff3e0" stroke="#ef6c00" stroke-width="2" filter="url(#sh)"/>
  <text x="460" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#e65100">② Orin Nano · 게이트웨이</text>
  <text x="460" y="162" text-anchor="middle" font-size="11.5" fill="#ef6c00">OP-TEE (ARM TrustZone)</text>
  <line x1="364" y1="176" x2="556" y2="176" stroke="#ffcc80"/>
  <text x="460" y="200" text-anchor="middle" font-size="12.5" fill="#37474f">whitelist 검증 (0x123)</text>
  <text x="460" y="226" text-anchor="middle" font-size="12.5" fill="#37474f">3-byte 서명 생성</text>
  <text x="460" y="252" text-anchor="middle" font-size="12.5" fill="#37474f">CAN ID 변환 0x123 → 0x456</text>
  <text x="460" y="298" text-anchor="middle" font-size="11" font-style="italic" fill="#bf360c">※ TA 코드는 저장소 외부</text>

  <!-- Node2 -->
  <rect x="640" y="105" width="240" height="215" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#sh)"/>
  <text x="760" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#1b5e20">③ Node2 · 제어 ECU</text>
  <text x="760" y="162" text-anchor="middle" font-size="11.5" fill="#2e7d32">Arduino UNO + ERIKA RTOS</text>
  <line x1="664" y1="176" x2="856" y2="176" stroke="#a5d6a7"/>
  <text x="760" y="200" text-anchor="middle" font-size="12.5" fill="#37474f">서명검증 micro_verify()</text>
  <text x="760" y="226" text-anchor="middle" font-size="12.5" fill="#37474f">DES 복호화</text>
  <text x="760" y="252" text-anchor="middle" font-size="12.5" fill="#37474f">control_rpm() RPM 제어</text>
  <text x="760" y="298" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1b5e20">회피 / 정상 주행</text>

  <!-- 화살표 1 -->
  <line x1="282" y1="205" x2="337" y2="205" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="309" y="195" text-anchor="middle" font-size="11.5" font-weight="700" fill="#37474f">0x123</text>
  <text x="309" y="223" text-anchor="middle" font-size="9.5" fill="#90a4ae">CAN</text>

  <!-- 화살표 2 -->
  <line x1="582" y1="205" x2="637" y2="205" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="609" y="195" text-anchor="middle" font-size="11.5" font-weight="700" fill="#37474f">0x456</text>
  <text x="609" y="223" text-anchor="middle" font-size="9.5" fill="#90a4ae">CAN</text>

  <!-- RPM 출력 -->
  <line x1="760" y1="320" x2="760" y2="358" stroke="#546e7a" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="600" y="360" width="320" height="58" rx="12" fill="#ede7f6" stroke="#5e35b1" stroke-width="2"/>
  <text x="760" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#4527a0">🏁 엔진 RPM 출력</text>
  <text x="760" y="405" text-anchor="middle" font-size="10.5" fill="#673ab7">lidar &lt; 500 &amp; 물체감지 → 회피 · 그 외 → 정상</text>
</svg>
